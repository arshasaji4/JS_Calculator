<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Calculator</title>

</head>

<body class=" bg-gradient-to-br from-lime-300 via-blue-300 to-lime-200 min-h-screen flex items-center justify-center">
    <div class="bg-blue-100 p-6  w-[300px] rounded shadow rounded-xl">



        <input type="text" id="display"
            class="w-full h-16 text-right text-3xl border-2 border-gray-300 rounded-xl px-4 mb-5 outline-none"
            disabled />
        <div class="grid grid-cols-4 gap-3">

            <!-- Row 1 -->
            <button class="btn bg-sky-400 hover:bg-sky-500 text-white py-3 rounded-xl text-lg font-semibold">C</button>
            <button
                class="btn bg-sky-400 hover:bg-sky-500 text-white py-3 rounded-xl text-lg font-semibold">DEL</button>

            <button class="btn bg-gray-800 hover:bg-sky-500 text-white py-3 rounded-xl text-lg font-semibold">%</button>
            <button class="btn bg-sky-400 hover:bg-sky-500 text-white py-3 rounded-xl text-lg font-semibold">/</button>

            <!-- Row 2 -->
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">7</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">8</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">9</button>
            <button class="btn bg-sky-400 text-white py-3 rounded-xl text-lg font-semibold">*</button>

            <!-- Row 3 -->
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">4</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">5</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">6</button>
            <button class="btn bg-sky-400 text-white py-3 rounded-xl text-lg font-semibold">-</button>

            <!-- Row 4 -->
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">1</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">2</button>
            <button class="btn bg-gray-400 text-white py-3 rounded-xl text-lg font-semibold">3</button>
            <button class="btn bg-sky-400 text-white py-3 rounded-xl text-lg font-semibold">+</button>

            <!-- Row 5 -->
            <button class="btn bg-gray-400  text-white py-3 rounded-xl text-lg font-semibold">0</button>
            <button class="btn bg-gray-400  text-white py-3 rounded-xl text-lg font-semibold">.</button>
            <button
                class="btn bg-pink-400  text-white py-3 rounded-xl text-lg font-semibold w-30">=</button>
        </div>


    </div>
    <script src="script.js"></script>

</body>

</html>
